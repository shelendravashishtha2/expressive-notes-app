# https://github.com/firebase/firebase-tools

name: Deploy Notes App to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22.22.2
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2

      - name: Pin npm to local version
        run: npm install -g npm@10.9.7

      - name: Show versions
        run: |
          node -v
          npm -v
          pwd
          ls -la

      - name: Use fresh npm cache
        run: |
          npm config set cache "${{ runner.temp }}/npm-cache" --global
          npm cache verify

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-online

      - name: Build app
        run: npm run build

      - name: Deploy notes site to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESUME_PORTFOLIO_98C1D }}
          projectId: resume-portfolio-98c1d
          channelId: live
          target: notes

      - name: Upload npm logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*