name: Deploy Notes App to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build app
        run: npm run build

      - name: Deploy notes site to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESUME_PORTFOLIO_98C1D }}
          projectId: resume-portfolio-98c1d
          channelId: live
          target: notes